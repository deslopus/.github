name: Workflow proposal
description: Propose a prompt, benchmark, review practice, or agent setup.
title: "[Proposal] "
labels:
  - proposal
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What agent behavior or workflow problem does this address?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: Describe the prompt, workflow, benchmark, review practice, or setup.
    validations:
      required: true
  - type: textarea
    id: verification
    attributes:
      label: How to evaluate it
      description: Explain how maintainers can test or compare the proposal.
    validations:
      required: true
  - type: textarea
    id: tradeoffs
    attributes:
      label: Tradeoffs
      description: Known limitations, risks, or cases where this may not work.
    validations:
      required: false
